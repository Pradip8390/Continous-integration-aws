<!DOCTYPE html>
<html>
<head>
    <title>Number Guessing Game</title>
</head>
<body style="text-align:center; margin-top:50px;">

    <h2>Guess a number between 1 and 100</h2>

    <form method="POST">
        <input type="number" name="guess" required>
        <button type="submit">Submit</button>
    </form>

    <h3>{{ message }}</h3>

</body>
</html>
